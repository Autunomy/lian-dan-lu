<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炼丹炉 · 个人博客</title>
  <meta name="description" content="从 GitHub 仓库读取 Markdown 的纯 HTML 博客。" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    :root,
    html[data-theme="light"] {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #6b7280;
      --link: #3b82f6;
      --code-bg: #f8fafc;
      --border: #e5e7eb;
      --active: #e0edff;
      --content-font-size: 17px;
    }

    html[data-theme="dark"] {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #e6edf3;
      --muted: #9da7b3;
      --link: #58a6ff;
      --code-bg: #161b22;
      --border: #30363d;
      --active: #1f6feb33;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout {
      display: grid;
      grid-template-columns: 300px 260px 1fr;
      height: 100vh;
      background: var(--bg);
    }
    .layout.toc-collapsed {
      grid-template-columns: 300px 56px 1fr;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 14px 10px 18px;
      overflow: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .brand {
      font-size: 20px;
      font-weight: 600;
      margin: 0 8px 6px;
    }
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 8px 6px;
      gap: 8px;
    }
    .theme-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .theme-btn:hover {
      background: var(--active);
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      margin: 0 8px 12px;
      word-break: break-all;
    }
    .tree-root,
    .tree-root ul {
      list-style: none;
      margin: 0;
      padding-left: 14px;
    }
    .tree-root { padding-left: 0; }
    .tree-folder > details > summary {
      cursor: pointer;
      user-select: none;
      color: var(--text);
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 14px;
    }
    .tree-file {
      padding: 2px 0;
      font-size: 14px;
      color: var(--muted);
      word-break: break-all;
    }
    .tree-file a {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 6px;
      color: var(--link);
    }
    .tree-file a.active {
      background: var(--active);
      text-decoration: none;
      color: var(--text);
    }
    .toc-panel {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 14px 10px 18px;
      overflow: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .toc-panel::-webkit-scrollbar { display: none; }
    .toc-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 6px 10px;
    }
    .toc-panel-title {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      font-weight: 700;
    }
    .toc-toggle-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 8px;
      padding: 2px 7px;
      font-size: 12px;
      cursor: pointer;
    }
    .toc-toggle-btn:hover { background: var(--active); }
    .toc-panel-content.hidden { display: none; }
    .layout.toc-collapsed .toc-panel {
      padding-left: 6px;
      padding-right: 6px;
    }
    .layout.toc-collapsed .toc-panel-title {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 2px;
    }
    .layout.toc-collapsed .toc-panel-head {
      flex-direction: column;
      margin-top: 6px;
    }
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar { display: none; }
    .header {
      height: 56px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .search {
      width: 320px;
      max-width: 60%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--code-bg);
      color: var(--text);
      outline: none;
    }
    .main-body {
      display: grid;
      grid-template-columns: 1fr;
      overflow: auto;
      padding: 30px 44px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .main-body::-webkit-scrollbar { display: none; }
    .article {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    .content-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }
    .font-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .font-btn:hover { background: var(--active); }
    .title { margin: 0 0 12px; font-size: 34px; line-height: 1.25; }
    .path {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
      word-break: break-all;
    }
    article { font-size: var(--content-font-size); }
    article img { max-width: 100%; }
    article pre {
      background: var(--code-bg);
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    article code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }
    article :not(pre) > code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1px 5px;
    }
    article pre code.hljs {
      background: transparent;
      padding: 0;
      border: 0;
      font-size: 0.9em;
      line-height: 1.6;
    }
    .tip {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      color: var(--muted);
      background: color-mix(in srgb, var(--code-bg) 65%, transparent);
    }
    .toc-wrap { margin-top: 0; }
    .toc-title {
      margin: 0 8px 8px;
      font-size: 16px;
      color: var(--muted);
      font-weight: 600;
    }
    .toc-list {
      list-style: none;
      margin: 0;
      padding: 0 0 0 6px;
    }
    .toc-item { margin: 2px 0; }
    .toc-link {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--link);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.35;
      word-break: break-all;
    }
    .toc-link:hover { background: var(--active); }
    .toc-level-2 { padding-left: 18px; }
    .toc-level-3 { padding-left: 34px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .layout.toc-collapsed { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        max-height: 42vh;
      }
      .toc-panel {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        max-height: 28vh;
      }
      .main { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <script>
    const CONFIG = {
      owner: "Autunomy",
      repo: "lian-dan-lu",
      branch: "main",
      docsDir: "AI"
    };

    const app = document.getElementById("app");
    const hljsThemeLink = document.getElementById("hljs-theme");
    const THEME_KEY = "blog-theme";
    const FONT_SIZE_KEY = "blog-content-font-size";
    const TOC_COLLAPSE_KEY = "blog-toc-collapsed";
    const HLJS_THEMES = {
      light: "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css",
      dark: "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    };
    const STATE = {
      tree: [],
      markdownFiles: [],
      theme: "light",
      contentFontSize: 17,
      tocEntries: [],
      tocCollapsed: false,
      treeKeyword: "",
      selectedPath: ""
    };

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    function getPreferredTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "light" || saved === "dark") return saved;
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      STATE.theme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", STATE.theme);
      if (hljsThemeLink) {
        hljsThemeLink.href = HLJS_THEMES[STATE.theme];
      }
    }

    function toggleTheme() {
      const next = STATE.theme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
      router();
    }

    function getPreferredFontSize() {
      const raw = Number(localStorage.getItem(FONT_SIZE_KEY));
      if (!Number.isFinite(raw)) return 17;
      return Math.min(28, Math.max(14, raw));
    }

    function applyContentFontSize(size) {
      STATE.contentFontSize = Math.min(28, Math.max(14, size));
      document.documentElement.style.setProperty("--content-font-size", STATE.contentFontSize + "px");
      localStorage.setItem(FONT_SIZE_KEY, String(STATE.contentFontSize));
    }

    function getTocCollapsedPreference() {
      return localStorage.getItem(TOC_COLLAPSE_KEY) === "1";
    }

    function toggleTocCollapsed() {
      STATE.tocCollapsed = !STATE.tocCollapsed;
      localStorage.setItem(TOC_COLLAPSE_KEY, STATE.tocCollapsed ? "1" : "0");
      router();
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function fetchJSON(url) {
      const res = await fetch(url, {
        headers: { Accept: "application/vnd.github+json" }
      });
      if (!res.ok) {
        const err = new Error("请求 GitHub 失败: " + res.status);
        err.status = res.status;
        throw err;
      }
      return res.json();
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("读取文章失败: " + res.status);
      return res.text();
    }

    function decodeBase64Utf8(base64) {
      const binary = atob(base64.replace(/\n/g, ""));
      const bytes = Uint8Array.from(binary, function(c) { return c.charCodeAt(0); });
      return new TextDecoder("utf-8").decode(bytes);
    }

    function getHashPath(path) {
      return "#/" + encodeURIComponent(path);
    }

    function encodePath(path) {
      return path.split("/").map(function(part) { return encodeURIComponent(part); }).join("/");
    }

    function compareText(a, b) {
      return a.localeCompare(b, "zh-Hans-CN");
    }

    function buildTree(paths) {
      const root = { name: "", type: "dir", path: "", children: [] };
      const dirMap = { "": root };

      paths.forEach(function(path) {
        const segments = path.split("/");
        let currentPath = "";
        for (let i = 0; i < segments.length; i += 1) {
          const name = segments[i];
          const parentPath = currentPath;
          currentPath = currentPath ? currentPath + "/" + name : name;
          const isFile = i === segments.length - 1;
          if (isFile) {
            const parent = dirMap[parentPath];
            parent.children.push({
              name: name,
              type: "file",
              path: currentPath
            });
          } else if (!dirMap[currentPath]) {
            const parent = dirMap[parentPath];
            const node = {
              name: name,
              type: "dir",
              path: currentPath,
              children: []
            };
            dirMap[currentPath] = node;
            parent.children.push(node);
          }
        }
      });

      function sortNode(node) {
        if (node.type !== "dir") return;
        node.children.sort(function(a, b) {
          if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
          return compareText(a.name, b.name);
        });
        node.children.forEach(sortNode);
      }

      sortNode(root);
      return root.children;
    }

    async function loadRepoTree() {
      const treeUrl = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo +
        "/git/trees/" + encodeURIComponent(CONFIG.branch) + "?recursive=1";
      const data = await fetchJSON(treeUrl);
      const blobs = (data.tree || []).filter(function(node) { return node.type === "blob"; });
      STATE.tree = buildTree(blobs.map(function(node) { return node.path; }));
      STATE.markdownFiles = blobs
        .filter(function(node) { return node.path.toLowerCase().endsWith(".md"); })
        .map(function(node) { return node.path; });
    }

    async function getMarkdownByPath(path) {
      const detailUrl = "https://api.github.com/repos/" + CONFIG.owner + "/" + CONFIG.repo +
        "/contents/" + encodePath(path) +
        "?ref=" + encodeURIComponent(CONFIG.branch);
      const data = await fetchJSON(detailUrl);
      if (data.content) return decodeBase64Utf8(data.content);
      if (data.download_url) return fetchText(data.download_url);
      throw new Error("无法解析文章内容");
    }

    function highlightCodeBlocks() {
      if (!window.hljs) return;
      const blocks = document.querySelectorAll("article pre code");
      blocks.forEach(function(block) {
        if (block.dataset.highlighted === "yes") return;
        const hasLanguage = /language-/.test(block.className);
        if (hasLanguage) {
          hljs.highlightElement(block);
        } else {
          const result = hljs.highlightAuto(block.textContent || "");
          block.innerHTML = result.value;
          block.classList.add("hljs");
        }
        block.dataset.highlighted = "yes";
      });
    }

    function renderTree(nodes, selectedPath) {
      return "<ul class='tree-root'>" + nodes.map(function(node) {
        if (STATE.treeKeyword) {
          const needle = STATE.treeKeyword.toLowerCase();
          const currentHit = node.name.toLowerCase().indexOf(needle) >= 0 || node.path.toLowerCase().indexOf(needle) >= 0;
          if (node.type === "file" && !currentHit) return "";
          if (node.type === "dir") {
            const subtree = renderTree(node.children, selectedPath);
            if (!currentHit && subtree === "<ul class='tree-root'></ul>") return "";
            return "<li class='tree-folder'><details open><summary>" + escapeHTML(node.name) +
              "</summary>" + subtree + "</details></li>";
          }
        }
        if (node.type === "dir") {
          return "<li class='tree-folder'><details open><summary>" + escapeHTML(node.name) +
            "</summary>" + renderTree(node.children, selectedPath) + "</details></li>";
        }
        const isMd = node.path.toLowerCase().endsWith(".md");
        if (!isMd) return "<li class='tree-file'>" + escapeHTML(node.name) + "</li>";
        const activeClass = node.path === selectedPath ? "active" : "";
        return "<li class='tree-file'><a class='" + activeClass + "' href='" + getHashPath(node.path) +
          "'>" + escapeHTML(node.name) + "</a></li>";
      }).join("") + "</ul>";
    }

    function renderTreeContainer(selectedPath) {
      return STATE.tree.length
        ? renderTree(STATE.tree, selectedPath)
        : "<div class='tip'>没有读取到仓库文件。</div>";
    }

    function renderToc() {
      if (!STATE.tocEntries.length) {
        return "<div class='toc-wrap'><p class='toc-title'>文档导航</p><div class='tip'>当前文档没有可导航标题。</div></div>";
      }
      return [
        "<div class='toc-wrap'>",
        "<p class='toc-title'>文档导航</p>",
        "<ul class='toc-list'>",
        STATE.tocEntries.map(function(item) {
          return "<li class='toc-item toc-level-" + String(item.level) + "'>" +
            "<button class='toc-link' data-anchor-id='" + escapeHTML(item.id) + "' type='button'>" +
            escapeHTML(item.text) + "</button></li>";
        }).join(""),
        "</ul>",
        "</div>"
      ].join("");
    }

    function makeAnchorId(text, index) {
      const normalized = text
        .toLowerCase()
        .trim()
        .replace(/[^\w\u4e00-\u9fa5\- ]+/g, "")
        .replace(/\s+/g, "-");
      return (normalized || "heading") + "-" + String(index);
    }

    function buildArticleWithToc(rawHTML) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = rawHTML;
      const headings = wrapper.querySelectorAll("h1, h2, h3");
      const toc = [];
      headings.forEach(function(node, idx) {
        const text = (node.textContent || "").trim();
        if (!text) return;
        const level = Number(node.tagName.replace("H", ""));
        const id = makeAnchorId(text, idx + 1);
        node.id = id;
        toc.push({ id: id, text: text, level: level });
      });
      return { html: wrapper.innerHTML, toc: toc };
    }

    function renderMainToolbar() {
      return [
        "<div class='content-toolbar'>",
        "<button id='font-dec' class='font-btn' type='button'>A-</button>",
        "<button id='font-reset' class='font-btn' type='button'>", String(STATE.contentFontSize), "px</button>",
        "<button id='font-inc' class='font-btn' type='button'>A+</button>",
        "</div>"
      ].join("");
    }

    function renderTocPanel() {
      const btnText = STATE.tocCollapsed ? "展开" : "折叠";
      const panelContentClass = STATE.tocCollapsed ? "toc-panel-content hidden" : "toc-panel-content";
      return [
        "<aside class='toc-panel'>",
        "<div class='toc-panel-head'>",
        "<button id='toc-toggle' class='toc-toggle-btn' type='button'>", btnText, "</button>",
        "</div>",
        "<div class='", panelContentClass, "'>",
        renderToc(),
        "</div>",
        "</aside>"
      ].join("");
    }

    function renderLayout(mainHTML, selectedPath) {
      STATE.selectedPath = selectedPath || "";
      const repoText = CONFIG.owner + "/" + CONFIG.repo + "@" + CONFIG.branch;
      const themeLabel = STATE.theme === "dark" ? "切换白昼" : "切换黑暗";
      const layoutClass = STATE.tocCollapsed ? "layout toc-collapsed" : "layout";
      app.innerHTML = [
        "<div class='", layoutClass, "'>",
        "<aside class='sidebar'>",
        "<div class='sidebar-head'>",
        "<p class='brand'>仓库文件树</p>",
        "<button id='theme-toggle' class='theme-btn' type='button'>", themeLabel, "</button>",
        "</div>",
        "<p class='meta'>", escapeHTML(repoText), "</p>",
        "<div id='tree-container'>", renderTreeContainer(STATE.selectedPath), "</div>",
        "</aside>",
        renderTocPanel(),
        "<main id='main-content' class='main'>",
        "<header class='header'>",
        "<input id='tree-search' class='search' placeholder='搜索文件...' value='", escapeHTML(STATE.treeKeyword), "' />",
        "<span class='path'>阅读模式</span>",
        "</header>",
        "<div class='main-body'><div class='article'>", renderMainToolbar(), mainHTML, "</div></div>",
        "</main>",
        "</div>"
      ].join("");
      const btn = document.getElementById("theme-toggle");
      if (btn) btn.addEventListener("click", toggleTheme);
      const tocToggleBtn = document.getElementById("toc-toggle");
      if (tocToggleBtn) tocToggleBtn.addEventListener("click", toggleTocCollapsed);
      const incBtn = document.getElementById("font-inc");
      const decBtn = document.getElementById("font-dec");
      const resetBtn = document.getElementById("font-reset");
      if (incBtn) {
        incBtn.addEventListener("click", function() {
          applyContentFontSize(STATE.contentFontSize + 1);
          router();
        });
      }
      if (decBtn) {
        decBtn.addEventListener("click", function() {
          applyContentFontSize(STATE.contentFontSize - 1);
          router();
        });
      }
      if (resetBtn) {
        resetBtn.addEventListener("click", function() {
          applyContentFontSize(17);
          router();
        });
      }
      const tocLinks = app.querySelectorAll(".toc-link");
      tocLinks.forEach(function(link) {
        link.addEventListener("click", function() {
          const targetId = link.getAttribute("data-anchor-id");
          if (!targetId) return;
          const target = document.getElementById(targetId);
          if (!target) return;
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
      const searchInput = document.getElementById("tree-search");
      if (searchInput) {
        searchInput.addEventListener("input", function() {
          STATE.treeKeyword = searchInput.value.trim();
          const treeContainer = document.getElementById("tree-container");
          if (!treeContainer) return;
          treeContainer.innerHTML = renderTreeContainer(STATE.selectedPath);
        });
      }
    }

    function renderHome() {
      STATE.tocEntries = [];
      const mdCount = STATE.markdownFiles.length;
      const mainHTML = [
        "<h1 class='title'>炼丹炉 · 个人博客</h1>",
        "<p class='path'>请从左侧目录树选择一个 Markdown 文件。</p>",
        "<div class='tip'>当前扫描到 <strong>", String(mdCount), "</strong> 个 Markdown 文件。</div>"
      ].join("");
      renderLayout(mainHTML, "");
    }

    function renderPost(path, html) {
      const title = path.split("/").pop().replace(/\.md$/i, "");
      const articleData = buildArticleWithToc(html);
      STATE.tocEntries = articleData.toc;
      const mainHTML = [
        "<h1 class='title'>", escapeHTML(title), "</h1>",
        "<div class='path'>", escapeHTML(path), "</div>",
        "<article>", articleData.html, "</article>"
      ].join("");
      renderLayout(mainHTML, path);
      highlightCodeBlocks();
    }

    function renderError(err) {
      STATE.tocEntries = [];
      const statusText = err && err.status ? "（HTTP " + err.status + "）" : "";
      const extra = err && err.status === 404
        ? "常见原因：仓库是私有仓库，或远程分支里还没有推送对应 Markdown 文件。"
        : "请确认仓库公开可访问，或稍后重试。";
      const mainHTML = [
        "<h1 class='title'>加载失败</h1>",
        "<div class='tip'>", escapeHTML((err.message || String(err)) + statusText), "</div>",
        "<p class='path'>", escapeHTML(extra), "</p>",
        "<a href='#/'>返回首页</a>"
      ].join("");
      renderLayout(mainHTML, "");
    }

    function readHashPath() {
      const raw = location.hash.replace(/^#\/?/, "");
      if (!raw) return "";
      return decodeURIComponent(raw);
    }

    async function router() {
      try {
        if (!STATE.tree.length) {
          await loadRepoTree();
        }
        const path = readHashPath();
        if (!path) {
          renderHome();
          return;
        }
        if (!path.toLowerCase().endsWith(".md")) {
          throw new Error("当前只支持打开 Markdown 文件");
        }
        if (STATE.markdownFiles.indexOf(path) < 0) {
          throw new Error("未找到文件: " + path);
        }
        const md = await getMarkdownByPath(path);
        const html = marked.parse(md);
        renderPost(path, html);
      } catch (err) {
        renderError(err);
      }
    }

    applyTheme(getPreferredTheme());
    applyContentFontSize(getPreferredFontSize());
    STATE.tocCollapsed = getTocCollapsedPreference();
    window.addEventListener("hashchange", function() { router(); });
    router();
  </script>
</body>
</html>
